<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechael | Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }

        .navbar {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a1a1a 0%, #4a4a4a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .back-link {
            color: #4a4a4a;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .projects-header {
            text-align: center;
            padding: 3rem 0 2rem;
        }

        .projects-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .projects-header p {
            color: #666;
            max-width: 600px;
            margin: 0 auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding: 2rem 0 4rem;
        }

        .project-card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-color: #d0d0d0;
        }

        /* Status badge styles */
        .status-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        .status-badge.live {
            background: #10b981;
            color: white;
        }

        .status-badge.coming-soon {
            background: #f59e0b;
            color: white;
        }

        /* Dim coming soon cards slightly */
        .project-card.coming-soon {
            opacity: 0.85;
        }

        .project-card.coming-soon:hover {
            opacity: 1;
        }

        .card-image {
            height: 200px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image img.contain {
            object-fit: contain;
            padding: 1rem;
        }

        .card-image i {
            font-size: 3rem;
            color: #999;
        }

        .project-card:hover .card-image {
            transform: scale(1.02);
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tech-tag {
            background: #f0f0f0;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #555;
            transition: all 0.2s;
        }

        .project-card:hover .tech-tag {
            background: #e5e5e5;
        }

       /* Simple gradient buttons */
        .card-buttons {
            display: flex;
            gap: 1rem;
        }

        .card-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        /* GitHub button - subtle gray gradient */
        .btn-github {
            background: linear-gradient(135deg, #4a4a4a 0%, #2d2d2d 100%);
            color: white;
        }

        .btn-github:hover {
            background: linear-gradient(135deg, #5a5a5a 0%, #3d3d3d 100%);
            transform: translateY(-2px);
            gap: 0.75rem;
        }

        /* Live Demo button - clean blue gradient (like Arshnoor) */
        .btn-demo {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-demo:hover {
            background: linear-gradient(135deg, #4a90f6 0%, #3570eb 100%);
            transform: translateY(-2px);
            gap: 0.75rem;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #999;
            font-size: 0.8rem;
            border-top: 1px solid #f0f0f0;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .container {
                padding: 0 1rem;
            }
            .projects-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Rechael</a>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </nav>

    <div class="container">
        <div class="projects-header">
            <h1>My Projects</h1>
            <p>Exploring the intersection of design, technology, and innovation</p>
        </div>

        <div class="projects-grid" id="projectsGrid"></div>
    </div>

    <footer>
        <p>© 2025 Rechael. Crafted with curiosity.</p>
    </footer>

    <script>
        // Project Data - All 12 Projects
        const projects = [
            {
                title: "TestPilot AI",
                imagePath: "Gallery/test.gif",
                description: "AI-powered testing agent that automatically generates and runs test cases for web applications. Identifies bugs and suggests fixes.",
                tech: ["TypeScript", "Playwright", "OpenAI API", "Jest"],
                githubLink: "https://github.com/RechaelLop/TestPilot-AI",
                demoLink: "#",
                status: "live"
            },
            {
                title: "Cloud Migration",
                imagePath: "Gallery/cloud.gif",
                description: "Enterprise cloud migration solution for BTC Enterprise using AWS ECS, Docker, and Power BI. Automates monitoring, API integration, and scalable workflows.",
                tech: ["Python", "Flask", "Docker", "AWS ECS", "Power BI"],
                githubLink: "https://github.com/RechaelLop/Cloud-Migration",
                demoLink: "#",
                status: "live"
            },
            {
                title: "Stock Prediction",
                imagePath: "Gallery/stocks.gif",
                description: "Fullstack AI-powered web app using LSTM deep learning models to predict stock closing prices. Features real-time analytics dashboards and PostgreSQL database integration.",
                tech: ["Python", "Streamlit", "LSTM", "PostgreSQL", "Power BI"],
                githubLink: "https://github.com/RechaelLop/Stock-Prediction",
                demoLink: "#",
                status: "live"
            },
            {
                title: "LunaSage",
                imagePath: "Gallery/agriculture.gif",
                description: "Dual-purpose AI application powered by lunar cycles. Helps farmers plan planting schedules and helps stargazers identify celestial events.",
                tech: ["Python", "FastAPI", "React", "NASA APIs"],
                githubLink: "https://github.com/RechaelLop/LunaSage",
                demoLink: "#",
                status: "live"
            },
            {
                title: "PowerConnect",
                imagePath: "Gallery/power.gif",
                description: "IoT-based energy consumption monitoring dashboard with real-time analytics, usage predictions, and cost optimization recommendations.",
                tech: ["Python", "FastAPI", "React", "InfluxDB", "MQTT"],
                githubLink: "https://github.com/RechaelLop/PowerConnect",
                demoLink: "#",
                status: "coming-soon"
            },
            {
                title: "Leaflet",
                imagePath: "Gallery/book.gif",
                description: "Community notice board platform for sharing announcements, events, and local information. Features real-time updates and location-based filtering.",
                tech: ["JavaScript", "Node.js", "Express", "MongoDB", "Socket.io"],
                githubLink: "https://github.com/RechaelLop/Leaflet",
                demoLink: "#",
                status: "live"
            },
            {
                title: "SilverMoves",
                imagePath: "Gallery/fitness.gif",
                description: "Accessible fitness tracking platform designed for seniors. Features exercise demos, progress tracking, and gentle reminder systems.",
                tech: ["React Native", "Firebase", "HealthKit API"],
                githubLink: "https://github.com/RechaelLop/SilverMoves",
                demoLink: "#",
                status: "coming-soon"
            },
            {
                title: "Weather Dashboard",
                imagePath: "Gallery/dashboard.gif",
                description: "Real-time weather application with interactive maps, 7-day forecasting, and severe weather alerts using OpenWeatherMap API.",
                tech: ["React", "OpenWeather API", "Chart.js", "CSS Modules"],
                githubLink: "https://github.com/RechaelLop/weather-dashboard",
                demoLink: "#",
                status: "coming-soon"
            },
            {
                title: "ToDo-AI Agent",
                imagePath: "Gallery/todo.gif",
                description: "Intelligent task management application with AI-powered prioritization, smart reminders, and natural language task creation.",
                tech: ["JavaScript", "OpenAI API", "Node.js", "MongoDB"],
                githubLink: "https://github.com/RechaelLop/To-Do-AI-Agent",
                demoLink: "#",
                status: "live"
            },
            {
                title: "Linux Backup Automation",
                imagePath: "Gallery/script.gif",
                description: "Automated backup solution for Linux servers with scheduling, compression, encryption, and cloud storage integration (AWS S3/Azure Blob).",
                tech: ["Bash", "Python", "Cron", "AWS CLI", "GPG"],
                githubLink: "https://github.com/RechaelLop/linux-backup-automation",
                demoLink: "#",
                status: "coming-soon"
            },
            {
                title: "Library Management System",
                imagePath: "Gallery/library.gif",
                description: "A complete library management system with book inventory, member management, borrowing/returning functionality, overdue tracking with fine calculation, and search capabilities. Deployed live on Railway.",
                tech: ["Python", "Flask", "SQLite", "SQL Server", "HTML/CSS", "REST API"],
                githubLink: "https://github.com/RechaelLop/LibraryManagementSystem",
                demoLink: "https://web-production-eba4ff.up.railway.app/",
                status: "live"
            },
            {
                title: "Railway Station",
                imagePath: "Gallery/train.gif",
                description: "A platform connecting surplus food donors with local communities. Reduces food waste through real-time inventory tracking and smart distribution logistics.",
                tech: ["React", "Node.js", "MongoDB", "Google Maps API"],
                githubLink: "https://github.com/RechaelLop/save-food",
                demoLink: "#",
                status: "coming-soon"
            }
        ];

        // Function to create project cards with status badges
        function createProjectCard(project) {
            return `
                <div class="project-card ${project.status === 'coming-soon' ? 'coming-soon' : ''}">
                    ${project.status ? `
                        <div class="status-badge ${project.status === 'live' ? 'live' : 'coming-soon'}">
                            ${project.status === 'live' ? '● Live' : '◔ Coming Soon'}
                        </div>
                    ` : ''}
                    <div class="card-image">
                        ${project.imagePath ? 
                            `<img src="${project.imagePath}" alt="${project.title} demo" onerror="this.src='https://placehold.co/400x200/f5f5f5/cccccc?text=No+Preview'">` : 
                            `<i class="fas fa-code"></i>`
                        }
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${project.title}</h3>
                        <p class="card-description">${project.description}</p>
                        <div class="tech-stack">
                            ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                        </div>
                        <div class="card-buttons">
                            <a href="${project.githubLink}" class="card-btn btn-github" target="_blank">
                                <i class="fab fa-github"></i> GitHub
                            </a>
                            <a href="${project.demoLink}" class="card-btn btn-demo" target="_blank">
                                ${project.status === 'live' ? 'Live Demo' : 'Preview'} <i class="fas fa-external-link-alt"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // Render all projects
        const projectsGrid = document.getElementById('projectsGrid');
        if (projectsGrid) {
            projectsGrid.innerHTML = projects.map(project => createProjectCard(project)).join('');
        }

        // Intersection observer for fade-in animation
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.project-card').forEach((card, index) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = `opacity 0.5s ease ${index * 0.1}s, transform 0.5s ease ${index * 0.1}s`;
            observer.observe(card);
        });
    </script>
</body>
</html>
